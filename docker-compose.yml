version: '3.8'

services:
  # Renamed service to force Docker Compose to build a new local image
  backup-companion-v2:
    build: .
    labels:
      - "version=2.4.0"
    container_name: portainer-backup-companion
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8765}:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - backup_data:/backups
      # For Google Drive:
      # - ./credentials.json:/app/credentials.json:ro
    environment:
      - PORTAINER_URL=${PORTAINER_URL}
      - PORTAINER_API_TOKEN=${PORTAINER_API_TOKEN}
      - PORTAINER_SSL_VERIFY=${PORTAINER_SSL_VERIFY:-true}
      - SECRET_KEY=${SECRET_KEY}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-local}
      - LOCAL_BACKUP_DIR=/backups
      # Google Drive Config:
      # - GDRIVE_FOLDER_ID=${GDRIVE_FOLDER_ID}
      # - GDRIVE_CREDENTIALS_FILE=/app/credentials.json
      # Optional: S3 / SFTP configs can be added here as well if needed

volumes:
  backup_data:
