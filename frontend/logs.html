<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logs | Backtainer</title>
    <meta name="description" content="System logs for Backtainer">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        .log-container {
            background-color: #000;
            color: #0f0;
            font-family: monospace;
            padding: 1rem;
            border-radius: 0.5rem;
            height: 60vh;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            border: 1px solid var(--border);
            font-size: 0.85rem;
        }
        
        .log-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Backtainer</h1>
            <nav>
                <a href="index.html">Dashboard</a>
                <a href="backups.html">History</a>
                <a href="schedules.html">Schedules</a>
                <a href="logs.html" class="active">Logs</a>
                <a href="settings.html">Settings</a>
            </nav>
        </header>

        <main>
            <div class="section-header">
                <h2>System Logs</h2>
            </div>
            
            <div class="card" style="padding: 1.5rem;">
                <div class="log-actions">
                    <p style="color: var(--text-muted); font-size: 0.85rem;">Auto-refreshing every 5 seconds.</p>
                    <button class="btn btn-outline btn-sm" onclick="fetchLogs()">Manual Refresh</button>
                </div>
                
                <div id="log-viewer" class="log-container">
                    Loading logs...
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
    <script>
        const logViewer = document.getElementById('log-viewer');
        let autoScroll = true;

        logViewer.addEventListener('scroll', () => {
            // Check if user has scrolled up
            const isAtBottom = logViewer.scrollHeight - logViewer.scrollTop <= logViewer.clientHeight + 50;
            autoScroll = isAtBottom;
        });

        async function fetchLogs() {
            try {
                const data = await apiCall('/api/logs?lines=1000');
                if (data.logs) {
                    logViewer.textContent = data.logs;
                    if (autoScroll) {
                        logViewer.scrollTop = logViewer.scrollHeight;
                    }
                }
            } catch (e) {
                console.error("Failed to fetch logs:", e);
                if (logViewer.textContent === "Loading logs...") {
                    logViewer.textContent = "Error fetching logs. Are you authenticated?";
                }
            }
        }

        // Initial fetch
        fetchLogs();
        
        // Auto-refresh every 5 seconds
        setInterval(fetchLogs, 5000);
    </script>
</body>
</html>
