<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedules | Portainer Backup Companion</title>
    <meta name="description" content="Automated backup schedule management for Portainer stacks">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Portainer Backup Companion</h1>
            <nav>
                <a href="index.html">Dashboard</a>
                <a href="backups.html">History</a>
                <a href="schedules.html" class="active">Schedules</a>
                <a href="settings.html">Settings</a>
            </nav>
        </header>

        <main>
            <div style="display: grid; grid-template-columns: 1fr 380px; gap: 2rem; align-items: start;">
                <!-- Schedule List -->
                <div>
                    <div class="section-header">
                        <h2>Active Schedules</h2>
                    </div>
                    <div class="card" style="padding: 0; overflow: hidden;">
                        <table>
                            <thead>
                                <tr>
                                    <th>Stack</th>
                                    <th>Cron</th>
                                    <th>Retention</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="schedule-list" hx-get="/api/schedules" hx-trigger="load">
                                <tr><td colspan="5" style="text-align: center; padding: 2rem; color: var(--text-muted);">Loading schedules...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- New Schedule Form -->
                <div class="card">
                    <h3 style="margin-bottom: 1.5rem;">New Schedule</h3>
                    <form hx-post="/api/schedules" hx-target="#schedule-list" hx-swap="beforeend" hx-ext="json-enc" hx-on::after-request="this.reset()">
                        <div class="form-group">
                            <label class="form-label">Stack ID</label>
                            <input type="text" name="stack_id" required class="form-input" placeholder="e.g. 5">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Stack Name (Label)</label>
                            <input type="text" name="stack_name" required class="form-input" placeholder="e.g. Mattermost">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Cron Expression</label>
                            <input type="text" name="cron_expression" placeholder="0 2 * * *" required class="form-input">
                            <p class="form-hint">Format: Min Hour Day Month Weekday — e.g. <code>0 2 * * *</code> = daily at 2 AM</p>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Retention (Days)</label>
                            <input type="number" name="retention_days" value="7" class="form-input">
                            <p class="form-hint">Backups older than this are auto-deleted. Set to 0 to keep forever.</p>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Create Schedule</button>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script src="https://unpkg.com/htmx.org/dist/ext/json-enc.js"></script>
    <script src="app.js"></script>
</body>
</html>
