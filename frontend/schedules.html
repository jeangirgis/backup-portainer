<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedules | Backtainer</title>
    <meta name="description" content="Automated backup schedule management for Portainer stacks">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Backtainer</h1>
            <nav>
                <a href="index.html">Dashboard</a>
                <a href="backups.html">History</a>
                <a href="schedules.html" class="active">Schedules</a>
                <a href="logs.html">Logs</a>
                <a href="settings.html">Settings</a>
                <button class="btn btn-outline btn-sm" onclick="toggleTheme()" style="margin-left: 1rem; padding: 0.2rem 0.5rem; font-size: 0.7rem;">🌓 Theme</button>
            </nav>
        </header>

        <main>
            <div style="display: grid; grid-template-columns: 1fr 400px; gap: 2rem; align-items: start;">
                <!-- Schedule List -->
                <div>
                    <div class="section-header">
                        <h2>Active Schedules</h2>
                    </div>
                    <div class="card" style="padding: 0; overflow: hidden;">
                        <table>
                            <thead>
                                <tr>
                                    <th>Stack</th>
                                    <th>Frequency</th>
                                    <th>Retention</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="schedule-list" hx-get="/api/schedules" hx-trigger="load">
                                <tr><td colspan="5" style="text-align: center; padding: 2rem; color: var(--text-muted);">Loading schedules...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- New Schedule Form -->
                <div class="card">
                    <h3 id="form-title" style="margin-bottom: 1.5rem;">➕ New Schedule</h3>
                    <form id="schedule-form" hx-post="/api/schedules" hx-target="#schedule-list" hx-swap="beforeend" hx-ext="json-enc" hx-on::after-request="resetForm()">

                        <!-- Stack Selection -->
                        <div class="form-group">
                            <label class="form-label">Stack ID</label>
                            <input type="text" name="stack_id" required class="form-input" placeholder="e.g. 5">
                            <p class="form-hint">Find the Stack ID on the Dashboard page</p>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Stack Name</label>
                            <input type="text" name="stack_name" required class="form-input" placeholder="e.g. Mattermost">
                            <p class="form-hint">A label to identify this backup</p>
                        </div>

                        <!-- Frequency Selection - User Friendly! -->
                        <div class="form-group">
                            <label class="form-label">Backup Frequency</label>
                            <div class="frequency-grid" id="freq-grid">
                                <button type="button" class="freq-btn active" data-cron="0 2 * * *" onclick="selectFreq(this)">
                                    <span class="freq-icon">🌙</span>
                                    <span class="freq-title">Daily</span>
                                    <span class="freq-desc">Every night at 2 AM</span>
                                </button>
                                <button type="button" class="freq-btn" data-cron="0 2 * * 0" onclick="selectFreq(this)">
                                    <span class="freq-icon">📅</span>
                                    <span class="freq-title">Weekly</span>
                                    <span class="freq-desc">Every Sunday at 2 AM</span>
                                </button>
                                <button type="button" class="freq-btn" data-cron="0 */6 * * *" onclick="selectFreq(this)">
                                    <span class="freq-icon">⚡</span>
                                    <span class="freq-title">Every 6 Hours</span>
                                    <span class="freq-desc">4 times per day</span>
                                </button>
                                <button type="button" class="freq-btn" data-cron="0 */12 * * *" onclick="selectFreq(this)">
                                    <span class="freq-icon">🔄</span>
                                    <span class="freq-title">Twice Daily</span>
                                    <span class="freq-desc">Every 12 hours</span>
                                </button>
                                <button type="button" class="freq-btn" data-cron="0 2 1 * *" onclick="selectFreq(this)">
                                    <span class="freq-icon">📆</span>
                                    <span class="freq-title">Monthly</span>
                                    <span class="freq-desc">1st of each month</span>
                                </button>
                                <button type="button" class="freq-btn" data-cron="custom" onclick="selectFreq(this)">
                                    <span class="freq-icon">🔧</span>
                                    <span class="freq-title">Custom</span>
                                    <span class="freq-desc">Enter cron expression</span>
                                </button>
                            </div>
                            <!-- Hidden cron input that gets submitted -->
                            <input type="hidden" name="cron_expression" id="cron-input" value="0 2 * * *">
                        </div>

                        <!-- Custom Cron (shown only when Custom is selected) -->
                        <div class="form-group" id="custom-cron-group" style="display: none;">
                            <label class="form-label">Cron Expression</label>
                            <input type="text" id="custom-cron-input" class="form-input" placeholder="0 2 * * *"
                                   oninput="document.getElementById('cron-input').value = this.value">
                            <p class="form-hint">Format: Minute Hour Day Month Weekday</p>
                        </div>

                        <!-- Retention -->
                        <div class="form-group">
                            <label class="form-label">Keep Backups For</label>
                            <div class="retention-grid">
                                <button type="button" class="ret-btn" data-days="3" onclick="selectRetention(this)">3 days</button>
                                <button type="button" class="ret-btn active" data-days="7" onclick="selectRetention(this)">7 days</button>
                                <button type="button" class="ret-btn" data-days="14" onclick="selectRetention(this)">14 days</button>
                                <button type="button" class="ret-btn" data-days="30" onclick="selectRetention(this)">30 days</button>
                                <button type="button" class="ret-btn" data-days="90" onclick="selectRetention(this)">90 days</button>
                                <button type="button" class="ret-btn" data-days="0" onclick="selectRetention(this)">Forever</button>
                            </div>
                            <input type="hidden" name="retention_days" id="retention-input" value="7">
                        </div>

                        <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
                            <button type="submit" id="submit-btn" class="btn btn-primary" style="flex: 1;" hx-indicator="#submit-spinner">
                                <div id="submit-spinner" class="spinner htmx-indicator" style="width: 1.2rem; height: 1.2rem;"></div>
                                <span id="submit-text">Create Schedule</span>
                            </button>
                            <button type="button" id="cancel-btn" class="btn btn-outline" style="display: none;" onclick="resetForm()">
                                Cancel
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
                <footer class="app-footer">
            <p style="text-align: center; font-size: 0.75rem; color: var(--text-muted);">
                Backtainer v2.5.0
            </p>
        </footer>

    </div>

    <script src="https://unpkg.com/htmx.org/dist/ext/json-enc.js"></script>
    <script src="app.js"></script>
    <script>
        function selectFreq(btn) {
            // Remove active from all
            document.querySelectorAll('.freq-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const cron = btn.dataset.cron;
            const customGroup = document.getElementById('custom-cron-group');

            if (cron === 'custom') {
                customGroup.style.display = 'block';
                document.getElementById('custom-cron-input').focus();
            } else {
                customGroup.style.display = 'none';
                document.getElementById('cron-input').value = cron;
            }
        }

        function selectRetention(btn) {
            document.querySelectorAll('.ret-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('retention-input').value = btn.dataset.days;
        }

        function editSchedule(id, stack_id, stack_name, cron, retention) {
            const form = document.getElementById('schedule-form');
            form.stack_id.value = stack_id;
            form.stack_name.value = stack_name;
            
            // set cron
            let foundFreq = false;
            document.querySelectorAll('.freq-btn').forEach(btn => {
                if (btn.dataset.cron === cron) {
                    selectFreq(btn);
                    foundFreq = true;
                }
            });
            if (!foundFreq) {
                const customBtn = document.querySelector('.freq-btn[data-cron="custom"]');
                selectFreq(customBtn);
                document.getElementById('custom-cron-input').value = cron;
                document.getElementById('cron-input').value = cron;
            }

            // set retention
            document.querySelectorAll('.ret-btn').forEach(btn => {
                if (btn.dataset.days == retention) {
                    selectRetention(btn);
                }
            });

            // update form to PUT
            form.setAttribute('hx-put', `/api/schedules/${id}`);
            form.removeAttribute('hx-post');
            form.setAttribute('hx-target', `#schedule-${id}`);
            form.setAttribute('hx-swap', 'outerHTML');
            htmx.process(form);

            document.getElementById('form-title').innerText = '✏️ Edit Schedule';
            document.getElementById('submit-text').innerText = 'Update Schedule';
            document.getElementById('cancel-btn').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            const form = document.getElementById('schedule-form');
            form.reset();
            document.getElementById('custom-cron-group').style.display = 'none';
            
            // Default select
            const defaultFreq = document.querySelector('.freq-btn[data-cron="0 2 * * *"]');
            if(defaultFreq) selectFreq(defaultFreq);
            
            const defaultRet = document.querySelector('.ret-btn[data-days="7"]');
            if(defaultRet) selectRetention(defaultRet);

            form.setAttribute('hx-post', '/api/schedules');
            form.removeAttribute('hx-put');
            form.setAttribute('hx-target', '#schedule-list');
            form.setAttribute('hx-swap', 'beforeend');
            htmx.process(form);

            document.getElementById('form-title').innerText = '➕ New Schedule';
            document.getElementById('submit-text').innerText = 'Create Schedule';
            document.getElementById('cancel-btn').style.display = 'none';
        }
    </script>
</body>
</html>
