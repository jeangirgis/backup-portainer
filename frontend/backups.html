<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History | Portainer Backup Companion</title>
    <meta name="description" content="Backup history and restore management for Portainer stacks">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Portainer Backup Companion</h1>
            <nav>
                <a href="index.html">Dashboard</a>
                <a href="backups.html" class="active">History</a>
                <a href="schedules.html">Schedules</a>
                <a href="settings.html">Settings</a>
            </nav>
        </header>

        <main>
            <div class="section-header">
                <h2>Backup History</h2>
                <button class="btn btn-outline" hx-get="/api/backups" hx-target="#backup-list" hx-swap="innerHTML">
                    Refresh
                </button>
            </div>

            <!-- Restore feedback toast area -->
            <div id="restore-toast" style="margin-bottom: 1.5rem;"></div>

            <div class="card" style="padding: 0; overflow: hidden;">
                <table>
                    <thead>
                        <tr>
                            <th>Stack Name</th>
                            <th>Status</th>
                            <th>Size</th>
                            <th>Triggered By</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="backup-list" hx-get="/api/backups" hx-trigger="load">
                        <tr>
                            <td colspan="6" style="text-align: center; padding: 3rem;">
                                <div class="spinner" style="margin: 0 auto 1rem;"></div>
                                <span style="color: var(--text-muted);">Loading history...</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
