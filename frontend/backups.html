<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History | Backtainer</title>
    <meta name="description" content="Backup history and restore management for Portainer stacks">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Backtainer</h1>
            <nav>
                <a href="index.html">Dashboard</a>
                <a href="backups.html" class="active">History</a>
                <a href="schedules.html">Schedules</a>
                <a href="logs.html">Logs</a>
                <a href="settings.html">Settings</a>
                <button class="btn btn-outline btn-sm" onclick="toggleTheme()" style="margin-left: 1rem; padding: 0.2rem 0.5rem; font-size: 0.7rem;">🌓 Theme</button>
            </nav>
        </header>

        <main>
            <div class="section-header">
                <h2>Backup History</h2>
                <div style="display: flex; gap: 0.5rem; align-items: center;">
                    <form id="upload-form" hx-post="/api/backups/upload" hx-encoding="multipart/form-data" hx-target="#restore-toast" hx-swap="innerHTML" style="display: inline;">
                        <input type="file" id="backup-file-input" name="file" accept=".tar.gz" style="display: none;" onchange="if(this.files.length > 0) document.getElementById('upload-submit').click();">
                        <button type="button" class="btn btn-primary" onclick="document.getElementById('backup-file-input').click();">
                            Upload Backup
                        </button>
                        <button type="submit" id="upload-submit" style="display: none;"></button>
                    </form>
                    <button class="btn btn-outline" hx-get="/api/backups" hx-target="#backup-list" hx-swap="innerHTML">
                        Refresh
                    </button>
                </div>
            </div>

            <!-- Restore feedback toast area -->
            <div id="restore-toast" style="margin-bottom: 1.5rem;"></div>

            <div class="card" style="padding: 0; overflow: hidden;">
                <table>
                    <thead>
                        <tr>
                            <th>Stack Name</th>
                            <th>Status</th>
                            <th>Size</th>
                            <th>Triggered By</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="backup-list" hx-get="/api/backups" hx-trigger="load">
                        <tr>
                            <td colspan="6" style="text-align: center; padding: 3rem;">
                                <div class="spinner" style="margin: 0 auto 1rem;"></div>
                                <span style="color: var(--text-muted);">Loading history...</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
                <footer class="app-footer">
            <p style="text-align: center; font-size: 0.75rem; color: var(--text-muted);">
                Backtainer v2.4.0
            </p>
        </footer>

    </div>
    <script src="app.js"></script>
</body>
</html>
