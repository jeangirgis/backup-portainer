<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Backtainer</title>
    <meta name="description" content="Automated backup dashboard for Portainer Docker stacks and volumes">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Backtainer</h1>
            <nav>
                <a href="index.html" class="active">Dashboard</a>
                <a href="backups.html">History</a>
                <a href="schedules.html">Schedules</a>
                <a href="logs.html">Logs</a>
                <a href="settings.html">Settings</a>
                <button class="btn btn-outline btn-sm" onclick="toggleTheme()" style="margin-left: 1rem; padding: 0.2rem 0.5rem; font-size: 0.7rem;">🌓 Theme</button>
            </nav>
        </header>

        <main>
            <!-- System Stats -->
            <div id="health-stats" hx-get="/api/health" hx-trigger="load, every 30s" hx-swap="innerHTML"
                 style="margin-bottom: 2.5rem;">
                <div class="stats-grid">
                    <div class="stat-card"><div class="spinner"></div></div>
                </div>
            </div>

            <!-- Stack Grid -->
            <div class="section-header">
                <h2>Docker Stacks</h2>
                <div style="display: flex; gap: 0.5rem; align-items: center;">
                    <div class="layout-toggle" id="layout-toggle">
                        <button class="layout-btn active" id="layout-grid-btn" onclick="setStackLayout('grid')" title="Grid view">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
                        </button>
                        <button class="layout-btn" id="layout-list-btn" onclick="setStackLayout('list')" title="List view">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="14" height="3" rx="1"/><rect x="1" y="6.5" width="14" height="3" rx="1"/><rect x="1" y="12" width="14" height="3" rx="1"/></svg>
                        </button>
                    </div>
                    <button class="btn btn-outline" hx-get="/api/stacks" hx-target="#stack-grid" hx-swap="innerHTML">
                        Refresh List
                    </button>
                </div>
            </div>

            <div id="stack-grid" class="grid" hx-get="/api/stacks" hx-trigger="load">
                <div class="card" style="grid-column: 1/-1; text-align: center; padding: 3rem;">
                    <div class="spinner" style="margin: 0 auto 1rem;"></div>
                    <p style="color: var(--text-muted);">Connecting to Portainer...</p>
                </div>
            </div>

            <script>
                // Restore saved layout preference
                (function() {
                    const saved = localStorage.getItem('stack_layout') || 'grid';
                    if (saved === 'list') {
                        document.addEventListener('DOMContentLoaded', function() {
                            setStackLayout('list');
                        });
                    }
                })();

                function setStackLayout(mode) {
                    const container = document.getElementById('stack-grid');
                    const gridBtn = document.getElementById('layout-grid-btn');
                    const listBtn = document.getElementById('layout-list-btn');

                    if (mode === 'list') {
                        container.classList.remove('grid');
                        container.classList.add('stack-list');
                        gridBtn.classList.remove('active');
                        listBtn.classList.add('active');
                    } else {
                        container.classList.remove('stack-list');
                        container.classList.add('grid');
                        listBtn.classList.remove('active');
                        gridBtn.classList.add('active');
                    }
                    localStorage.setItem('stack_layout', mode);
                }

                // Re-apply layout after HTMX swaps new content in
                document.body.addEventListener('htmx:afterSwap', function(evt) {
                    if (evt.detail.target && evt.detail.target.id === 'stack-grid') {
                        const saved = localStorage.getItem('stack_layout') || 'grid';
                        setStackLayout(saved);
                    }
                });
            </script>
        </main>

                <footer class="app-footer">
            <p style="text-align: center; font-size: 0.75rem; color: var(--text-muted);">
                Backtainer v2.5.0 • <a href="https://github.com/jeangirgis/backtainer" target="_blank" style="color: inherit; text-decoration: underline;">Star this repo on GitHub ⭐</a>
            </p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
